<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunitat i FAQ</title>
    <style>
        /* 1. VARIABLES I TEMES */
        :root {
            --bg: #f4f4f9;
            --card-bg: #ffffff;
            --text: #2c3e50;
            --text-muted: #555;
            --border: #eeeeee;
            --accent: #3498db;
            --nav-bg: #ffffff;
        }

        body.dark-mode {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text: #e0e0e0;
            --text-muted: #aaaaaa;
            --border: #333333;
            --accent: #2ecc71; /* Verd més suau per al mode fosc */
            --nav-bg: #1e1e1e;
        }

        /* 2. BASE */
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 20px; 
            background-color: var(--bg); 
            color: var(--text);
            transition: background 0.3s, color 0.3s;
        }

        /* 3. CAPÇALERA INTEL·LIGENT */
        .navbar {
            position: fixed; top: 0; left: 0; width: 100%; height: 65px;
            background: var(--nav-bg); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; z-index: 2000; 
            transition: top 0.3s ease-in-out;
        }
        .navbar.hidden { top: -75px; }
        
        .navbar-content {
            width: 100%; max-width: 900px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: center; padding: 0 20px;
        }
        .logo { font-weight: bold; color: var(--accent); font-size: 1.2rem; }
        
        #dark-mode-toggle {
            background: none; border: 1px solid var(--border); border-radius: 8px;
            padding: 5px 12px; cursor: pointer; color: var(--text); font-size: 1.1rem;
        }

        .header-spacer { height: 100px; }

        h1 { text-align: center; margin-bottom: 30px; }

        /* 4. CERCADOR */
        #cercador {
            width: 100%; padding: 15px; margin-bottom: 30px;
            border: 2px solid var(--accent); border-radius: 8px;
            font-size: 16px; box-sizing: border-box;
            background: var(--card-bg); color: var(--text);
        }

        /* 5. ACORDIÓ */
        .faq-item {
            background: var(--card-bg); margin-bottom: 15px; border-radius: 8px;
            overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border: 1px solid var(--border);
        }

        .faq-pregunta {
            width: 100%; padding: 18px 20px; background: none; border: none;
            text-align: left; font-size: 18px; font-weight: bold;
            color: var(--text); cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
        }
        .faq-pregunta:hover { background: rgba(0,0,0,0.02); }

        .faq-resposta {
            max-height: 0; overflow: hidden;
            transition: max-height 0.4s ease-out;
            background: var(--card-bg); color: var(--text-muted);
        }

        .faq-item.active .faq-resposta {
            max-height: 1000px; border-top: 1px solid var(--border); padding: 20px;
        }

        /* 6. MINI-CARRUSSEL */
        .mini-carousel { display: flex; align-items: center; gap: 10px; margin-top: 15px; }
        .mini-slides { flex-grow: 1; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); overflow: hidden; }
        .mini-slide { display: none; }
        .mini-slide.active { display: block; }
        
        .header-slide {
            display: flex; align-items: center; padding: 12px; gap: 12px;
            background: rgba(0,0,0,0.05); border-bottom: 1px solid var(--border);
        }
        .mini-logo { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 15px; }
        th { color: var(--accent); width: 30%; }

        .nav-btn {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 50%;
            width: 35px; height: 35px; cursor: pointer; color: var(--text);
        }
        .nav-btn:hover { background: var(--accent); color: white; }

    </style>
</head>
<body>

    <header class="navbar">
        <div class="navbar-content">
            <span class="logo">Comunitat 💬</span>
            <button id="dark-mode-toggle" onclick="toggleDarkMode()">🌙</button>
        </div>
    </header>

    <div class="header-spacer"></div>

    <h1>Preguntes Freqüents (FAQ)</h1>

    <input type="text" id="cercador" placeholder="Busca per paraula clau..." onkeyup="filtrarFaqs()">

    <div id="faq-container">
        
        <div class="faq-item">
            <button class="faq-pregunta" onclick="toggleFaq(this)">Com demano l'accés? <span>+</span></button>
            <div class="faq-resposta">
                Has d'omplir el formulari de registre a la web oficial de la comunitat. Un cop validat, rebràs l'enllaç d'invitació.
            </div>
        </div>

        <div class="faq-item">
            <button class="faq-pregunta" onclick="toggleFaq(this)">Normatives dels grups <span>+</span></button>
            <div class="faq-resposta">
                <div class="mini-carousel">
                    <button class="nav-btn" onclick="moveMiniSlide(-1, this)">&#10094;</button>
                    <div class="mini-slides">
                        <div class="mini-slide active">
                            <div class="header-slide">
                                <img src="logo-alfa.png" class="mini-logo" alt="A">
                                <strong>Grup Alfa</strong>
                            </div>
                            <table>
                                <tr><th>Permès:</th><td>Avisos oficials</td></tr>
                                <tr><th>Prohibit:</th><td>Xatejar</td></tr>
                            </table>
                        </div>
                        <div class="mini-slide">
                            <div class="header-slide">
                                <img src="logo-beta.png" class="mini-logo" alt="B">
                                <strong>Grup Beta</strong>
                            </div>
                            <table>
                                <tr><th>Permès:</th><td>Debats lliures</td></tr>
                                <tr><th>Prohibit:</th><td>Faltar al respecte</td></tr>
                            </table>
                        </div>
                    </div>
                    <button class="nav-btn" onclick="moveMiniSlide(1, this)">&#10095;</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // DARK MODE
        function toggleDarkMode() {
            const body = document.body;
            const btn = document.getElementById('dark-mode-toggle');
            body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            btn.innerText = isDark ? '☀️' : '🌙';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        // AUTO-LOAD THEME
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('dark-mode-toggle').innerText = '☀️';
            }
        });

        // NAVBAR SCROLL EFFECT
        let lastScrollTop = 0;
        window.addEventListener('scroll', () => {
            const navbar = document.querySelector('.navbar');
            let st = window.pageYOffset || document.documentElement.scrollTop;
            if (st > lastScrollTop && st > 100) navbar.classList.add('hidden');
            else navbar.classList.remove('hidden');
            lastScrollTop = st <= 0 ? 0 : st;
        });

        // ACORDIÓ
        function toggleFaq(element) {
            const item = element.parentElement;
            item.classList.toggle('active');
            const span = element.querySelector('span');
            span.textContent = item.classList.contains('active') ? '−' : '+';
        }

        // CERCA
        function filtrarFaqs() {
            const input = document.getElementById('cercador').value.toLowerCase();
            const items = document.getElementsByClassName('faq-item');
            for (let i = 0; i < items.length; i++) {
                const text = items[i].innerText.toLowerCase();
                items[i].style.display = text.includes(input) ? "block" : "none";
            }
        }

        // CARRUSSEL
        function moveMiniSlide(step, btn) {
            const container = btn.closest('.mini-carousel');
            const slides = container.querySelectorAll('.mini-slide');
            let currentIdx = Array.from(slides).findIndex(s => s.classList.contains('active'));
            slides[currentIdx].classList.remove('active');
            let nextIdx = (currentIdx + step + slides.length) % slides.length;
            slides[nextIdx].classList.add('active');
        }
    </script>
</body>
</html>
